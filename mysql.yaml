- name: install mysql configuration
  hosts: mysql
  become: yes
  vars:
    mysql_root_password: ExpenseApp@1
    login_host: mysql.khaleja.fun
  tasks:
  - name: ansible to install Pymysql 
    ansible.builtin.pip:
      name: PyMySQL
      executable: pip3.9

  - name: install mysql
    ansible.builtin.package:
      name: mysql-server
      state: present

  - name: start mysql
    ansible.builtin.service:
      name: mysqld 
      state: started
      enabled: yes

  - name: connect mysql server
    community.mysql.mysql_info:
      login_user: root
      login_password: "{{ mysql_root_password }}"
      login_host: "{{ login_host }}"
    ignore_error: true
    register: mysql_info

  - name: print the Information
    ansible.builtin.debug:
      msg: "{{ mysql_info }}"